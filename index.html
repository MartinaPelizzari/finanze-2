<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanze">

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-192.png">

<title>Finanze</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root{
  --bg: #000000;
  --sf: #111111; 
  --sf2: #1e1e1e;
  --bd: rgba(255, 255, 255, 0.08); 
  --gold: #fbbf24;
  --ga: rgba(251, 191, 36, 0.12);
  --green: #34d399;
  --gra: rgba(52, 211, 153, 0.12);
  --red: #f87171;
  --ra: rgba(248, 113, 113, 0.12);
  --blue: #60a5fa;
  --ba: rgba(96, 165, 250, 0.12);
  --purple: #a78bfa;
  --pa: rgba(167, 139, 250, 0.12);
  --tx: #f9fafb;
  --tx2: #9ca3af;
  --tx3: #6b7280;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --r: 24px; 
  --rs: 16px;
  --nav: 86px; 
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:15px;overflow-x:hidden}

.page{display:none;padding:0 0 calc(var(--nav) + 80px);min-height:100dvh}
.page.active{display:block;animation:fu .3s cubic-bezier(0.16, 1, 0.3, 1)}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:max(56px, env(safe-area-inset-top, 56px)) 20px 16px;gap:8px}
.tb-title{font-size:28px;font-weight:700;letter-spacing:-0.03em; color: var(--tx);}
.tb-sub{font-size:13px;color:var(--tx2);margin-top:2px; font-weight: 500;}
.mnav{display:flex;align-items:center;gap:6px;flex-shrink:0; background: var(--sf); padding: 4px; border-radius: 100px; border: 1px solid var(--bd);}
.mnav-btn{width:28px;height:28px;border-radius:50%;background:transparent;border:none;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mnav-lbl{font-size:12px;min-width:90px;text-align:center;color:var(--tx);font-weight:600; white-space:nowrap; overflow:hidden;}
.period-btn{background:var(--sf); border:1px solid var(--bd); padding:8px 14px; border-radius:100px; font-size:12px; font-weight:600; color:var(--tx); cursor:pointer; display:flex; align-items:center; gap:6px;}

.pw{padding:0 20px}

/* HERO & IO CARDS */
.hero-clean { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 20px 0 32px; }
.hc-val { font-family: var(--mono); font-size: 48px; font-weight: 700; color: var(--tx); letter-spacing: -0.04em; margin-bottom: 16px;}
.dash-io { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.io-card { background: var(--sf); border: 1px solid var(--bd); border-radius: var(--rs); padding: 16px; display: flex; align-items: center; gap: 12px; }
.io-val { font-family: var(--mono); font-size: 16px; font-weight: 600; color: var(--tx); }

/* LISTS */
.txl, .fxl { display: flex; flex-direction: column; margin-bottom: 24px; background: var(--sf); border: 1px solid var(--bd); border-radius: var(--r); overflow: hidden; }
.txr, .fxr { display: flex; align-items: center; gap: 14px; padding: 16px; border-bottom: 1px solid var(--bd); }
.tx-amt { font-family: var(--mono); font-size: 15px; font-weight: 600; }

/* BOTTOM NAV */
.bnav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; align-items: center; justify-content: space-between; padding: 12px 12px max(24px, env(safe-area-inset-bottom, 16px)); z-index: 50; }
.nt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center; gap:4px;padding:6px 0;cursor:pointer;color:var(--tx3);font-size:10px;font-weight:600;}
.nt.active{color:var(--tx)}
.fab{width:56px;height:56px;border-radius:50%;background:var(--tx);color:var(--bg);border:none; cursor:pointer;display:flex;align-items:center;justify-content:center; transform:translateY(-24px); box-shadow: 0 8px 24px rgba(255,255,255,0.2);} 

/* OVERLAY & SHEETS */
.overlay{position:fixed;inset:0;background:rgba(0, 0, 0, 0.8);z-index:90; backdrop-filter: blur(4px); opacity:0;pointer-events:none;transition:opacity .3s ease}
.overlay.on{opacity:1;pointer-events:all}

/* FIX BUG 2: Posizionamento Sheet Ancorato al fondo */
.sheet{position:fixed; bottom:0; left:0; right:0; background:var(--sf); border-radius:28px 28px 0 0; border-top:1px solid var(--bd); z-index:100; transform:translateY(105%); transition:transform .35s cubic-bezier(0.16, 1, 0.3, 1); max-height:92dvh; display:flex; flex-direction:column;}
.sheet.open{transform:translateY(0);}
.sh-drag{width:48px;height:5px;background:var(--tx3);border-radius:3px;margin:16px auto 0;flex-shrink:0;opacity:0.5;}
.sh-body{overflow-y:auto;flex:1;padding:0 24px 24px;-webkit-overflow-scrolling: touch;}
.sh-title{font-size:24px;font-weight:700;margin:24px 0 20px;color:var(--tx);letter-spacing:-0.02em;}

.fg{margin-bottom:20px}
.fi,.fs{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:14px; color:var(--tx);padding:16px;font-family:var(--sans);font-size:16px; outline:none;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* Pulsanti Azione */
.f-acts { display: flex; gap: 12px; flex-shrink: 0; padding: 16px 24px calc(16px + env(safe-area-inset-bottom, 16px)); background: var(--sf); border-top: 1px solid var(--bd); position: relative; z-index: 102; pointer-events: all !important;}
.btn{flex:1;padding:18px;border-radius:16px;font-family:var(--sans);font-size:16px; font-weight:600;cursor:pointer;border:none;}
.btnp{background:var(--tx);color:var(--bg);}.btng{background:var(--bg);color:var(--tx);border:1px solid var(--bd);}

/* Altre utilità */
.empty{text-align:center;padding:40px 20px;color:var(--tx3)}
.add-btn{width:100%;padding:16px;background:var(--sf);border:1px dashed var(--bd); border-radius:var(--rs);color:var(--tx2);font-weight:600; cursor:pointer;margin-bottom:24px;display:flex;align-items:center;justify-content:center;gap:10px;}
.insights-w { display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px; }
.insight-card { display: flex; align-items: flex-start; gap: 12px; padding: 14px; border-radius: var(--rs); background: var(--sf); border: 1px solid var(--bd); }
.wgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.wcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:16px;position:relative;overflow:hidden;}

/* Onboarding */
#onboarding-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:9999; flex-direction:column; justify-content:center; align-items:center; padding:20px; }
.ob-card { background:var(--sf); border:1px solid var(--bd); border-radius:28px; padding:32px 24px; width:100%; max-width:400px; text-align:center; }
</style>
</head>
<body>

<div id="onboarding-modal">
  <div class="ob-card">
      <div class="ob-icon" style="font-size:48px; margin-bottom:16px;">👋</div>
      <div class="ob-title" style="font-size:24px; font-weight:700; margin-bottom:12px;">Benvenuto</div>
      <div class="ob-desc" style="color:var(--tx2); margin-bottom:24px;">Inserisci i dati iniziali per iniziare.</div>
      <div class="fg"><input type="text" id="onb-name" class="fi" placeholder="Il tuo nome"></div>
      <div class="fg"><input type="text" inputmode="decimal" id="onb-amt" class="fi" placeholder="Saldo iniziale €"></div>
      <div class="fg"><input type="month" id="onb-month" class="fi"></div>
      <button class="btn btnp" style="width:100%" onclick="finishOnboarding()">Inizia</button>
  </div>
</div>

<div class="page active" id="pg-home">
  <div class="topbar">
    <div><div class="tb-title">Dashboard</div><div id="home-sub" class="tb-sub"></div></div>
    <button class="mnav-btn" data-a="open-settings" id="btn-settings" style="background:var(--sf); border:1px solid var(--bd); width:36px; height:36px; border-radius:12px;"></button>
  </div>
  <div class="pw">
    <div class="hero-clean"><div class="hc-val" id="h-liquidita">€0.00</div></div>
    <div class="dash-io">
        <div class="io-card"><div class="io-val" id="h-inc">€0</div></div>
        <div class="io-card"><div class="io-val" id="h-exp">€0</div></div>
    </div>
    <div class="insights-w" id="home-insights"></div>
    <div id="home-stats-list" class="stat-list"></div>
  </div>
</div>

<div class="page" id="pg-movimenti">
  <div class="topbar">
    <div class="tb-title">Movimenti</div>
    <div class="mnav">
      <button class="mnav-btn" data-a="prev-month" id="icon-chevron-left-2"></button>
      <div class="mnav-lbl" id="mov-mlbl"></div>
      <button class="mnav-btn" data-a="next-month" id="icon-chevron-right-2"></button>
    </div>
  </div>
  <div class="pw">
    <div id="fx-list"></div>
    <button class="add-btn" data-a="add-fx">+ Spesa Fissa</button>
    <div id="mov-txl"></div>
  </div>
</div>

<nav class="bnav">
  <div class="nt active" data-a="nav-home">Home</div>
  <div class="nt" data-a="nav-movimenti">Movimenti</div>
  <button class="fab" data-a="open-add-choice">+</button>
  <div class="nt" data-a="nav-portafogli">Portafogli</div>
  <div class="nt" data-a="nav-analisi">Analisi</div>
</nav>

<div class="overlay" id="overlay" data-a="close-all"></div>

<div class="sheet" id="sh-tx">
  <div class="sh-drag"></div>
  <div class="sh-body">
    <div class="sh-title" id="sh-tx-ttl">Nuova Transazione</div>
    <div class="fg"><input class="fi" type="date" id="tx-date"></div>
    <div class="fg"><input class="fi" type="text" inputmode="decimal" id="tx-amt" placeholder="0,00 €"></div>
    <div class="fg"><input class="fi" type="text" id="tx-desc" placeholder="Descrizione"></div>
    <div class="fg" id="fg-cat"><select class="fs" id="tx-cat"><option value="Altro">Altro</option></select></div>
    <div class="fg" id="fg-wallet"><select class="fs" id="tx-wallet"><option value="">Nessun portafoglio</option></select></div>
  </div>
  <div class="f-acts">
    <button class="btn btng" data-a="close-sh-tx">Annulla</button>
    <button class="btn btnp" data-a="save-tx">Salva</button>
  </div>
</div>

<div class="sheet" id="sh-add-choice">
    <div class="sh-drag"></div>
    <div class="sh-body">
        <div class="sh-title" style="text-align:center">Aggiungi</div>
        <div style="display:flex; gap:12px; padding:20px 0;">
            <button class="btn btng" data-a="add-tx-expense">Uscita</button>
            <button class="btn btng" data-a="add-tx-income">Entrata</button>
        </div>
    </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// CORE DATA
// ════════════════════════════════════════════════════════════════
let S = {transactions:[], wallets:[], initialBalance:0, userName:""};
const SKEY = 'finanze_v7';

function loadS(){
    const r=localStorage.getItem(SKEY);
    if(r) S=JSON.parse(r);
    if(!S.userName) document.getElementById('onboarding-modal').style.display='flex';
}
function saveS(){localStorage.setItem(SKEY,JSON.stringify(S))}

// ════════════════════════════════════════════════════════════════
// UI LOGIC
// ════════════════════════════════════════════════════════════════
function openSheet(id){
    const s = document.getElementById(id);
    s.classList.add('open');
    document.getElementById('overlay').classList.add('on');
}

function closeSheet(id){
    const s = document.getElementById(id);
    if(s) s.classList.remove('open');
    // Rimuoviamo gli stili inline JS residui per evitare il Bug 1
    setTimeout(() => { 
        if(s) s.style.bottom = ''; 
        if(!document.querySelector('.sheet.open')) document.getElementById('overlay').classList.remove('on');
    }, 300);
}

function closeAll(){
    document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open'));
    document.getElementById('overlay').classList.remove('on');
    setTimeout(() => {
        document.querySelectorAll('.sheet').forEach(s => s.style.bottom = '');
    }, 300);
}

function renderHome(){
    document.getElementById('h-liquidita').textContent = "€" + (S.initialBalance || 0).toFixed(2);
    document.getElementById('home-sub').textContent = S.userName || "Benvenuto";
}

// ════════════════════════════════════════════════════════════════
// BUG FIX 1: Listener Bottoni & Central Delegation
// ════════════════════════════════════════════════════════════════
document.addEventListener('click', function(e){
  let el = e.target;
  while(el && el !== document){
    if(el.dataset && el.dataset.a) break;
    el = el.parentElement;
  }
  if(!el || !el.dataset || !el.dataset.a) return;

  const a = el.dataset.a;
  
  // Gestione esplicita chiusura bottoni
  if(a === 'close-sh-tx') { closeSheet('sh-tx'); return; }
  if(a === 'close-all')   { closeAll(); return; }

  switch(a){
    case 'nav-home': 
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.getElementById('pg-home').classList.add('active');
        break;
    case 'open-add-choice': openSheet('sh-add-choice'); break;
    case 'add-tx-expense':  
        closeSheet('sh-add-choice');
        document.getElementById('sh-tx-ttl').textContent = "Nuova Uscita";
        openSheet('sh-tx'); 
        break;
    case 'save-tx': 
        // Logica salvataggio fittizia per demo
        closeSheet('sh-tx'); 
        break;
  }
}, true);

function finishOnboarding(){
    S.userName = document.getElementById('onb-name').value;
    S.initialBalance = parseFloat(document.getElementById('onb-amt').value) || 0;
    saveS();
    document.getElementById('onboarding-modal').style.display='none';
    renderHome();
}

// ════════════════════════════════════════════════════════════════
// BUG FIX 1 & 2: iOS Keyboard & Position Fix
// ════════════════════════════════════════════════════════════════
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
        const openSheet = document.querySelector('.sheet.open');
        if (!openSheet) return;

        const layoutH = window.innerHeight;
        const visualH = window.visualViewport.height;
        const diff = layoutH - visualH;

        if (diff > 50) {
            // Tastiera Aperta: Solleviamo il sheet esattamente sopra la tastiera
            openSheet.style.bottom = diff + 'px';
            openSheet.style.transition = 'none'; // Reattività immediata
        } else {
            // Tastiera Chiusa: Torniamo a 0 (Bug 2 Fix)
            openSheet.style.bottom = '0px';
            openSheet.style.transition = 'transform .35s cubic-bezier(0.16, 1, 0.3, 1)';
        }
    });
}

// Reset scroll su chiusura tastiera (Hitbox Fix)
document.addEventListener('focusout', (e) => {
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) {
        window.scrollTo(0, 0);
    }
});

loadS();
renderHome();
</script>
</body>
</html>
